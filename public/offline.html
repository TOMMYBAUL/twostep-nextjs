<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1F36" />
    <title>Two-Step — Hors connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Barlow", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: #1A1F36;
            color: #FFFFFF;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 {
            font-family: "Archivo Black", Impact, sans-serif;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            max-width: 280px;
            line-height: 1.5;
        }
        .retry {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #4268FF;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .retry:active { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Pas de connexion</h1>
    <p>Vérifie ta connexion internet et réessaie. Tes favoris et recherches seront de retour.</p>
    <button class="retry" onclick="location.reload()">Réessayer</button>
</body>
</html>
